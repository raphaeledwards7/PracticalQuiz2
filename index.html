<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A-Frame Installation</title>
    <script src="aframe.js"></script>
</head>
<body>
<a-scene background="color: #87CEEB">

  <!-- ===================== LIGHTING ===================== -->
  <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
  <a-light type="directional" color="#fff8e7" intensity="1.2" position="3 6 2"></a-light>
  <a-light type="point" color="#ffe4b5" intensity="0.8" position="0 3.2 0"></a-light>

  <!-- ===================== ROOM ===================== -->

  <!-- Floor (wood-style) -->
  <a-plane rotation="-90 0 0" width="14" height="14" position="0 0 0" color="#8B5E3C" roughness="0.9"></a-plane>
  <!-- Floor planks detail -->
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 -2" color="#7a5230"></a-plane>
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 -1" color="#7a5230"></a-plane>
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 0" color="#7a5230"></a-plane>
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 1" color="#7a5230"></a-plane>
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 2" color="#7a5230"></a-plane>
  <a-plane rotation="-90 0 0" width="13.8" height="0.08" position="0 0.002 3" color="#7a5230"></a-plane>

  <!-- Back Wall -->
  <a-plane rotation="0 0 0" width="14" height="7" position="0 3.5 -7" color="#F5ECD7"></a-plane>
  <!-- Left Wall -->
  <a-plane rotation="0 90 0" width="14" height="7" position="-7 3.5 0" color="#EDE0CB"></a-plane>
  <!-- Right Wall -->
  <a-plane rotation="0 -90 0" width="14" height="7" position="7 3.5 0" color="#EDE0CB"></a-plane>
  <!-- Ceiling -->
  <a-plane rotation="90 0 0" width="14" height="14" position="0 7 0" color="#FDF6EC"></a-plane>

  <!-- Skirting boards -->
  <a-box position="0 0.05 -6.95" width="14" height="0.12" depth="0.05" color="#c9a97a"></a-box>
  <a-box position="-6.95 0.05 0" width="0.05" height="0.12" depth="14" color="#c9a97a"></a-box>
  <a-box position="6.95 0.05 0" width="0.05" height="0.12" depth="14" color="#c9a97a"></a-box>

  <!-- ===================== WINDOW (back wall) ===================== -->
  <!-- Window frame -->
  <a-box position="-3 3.8 -6.9" width="2.4" height="2.4" depth="0.12" color="#c9a97a"></a-box>
  <!-- Window glass pane (sky blue) -->
  <a-box position="-3 3.8 -6.85" width="2.1" height="2.1" depth="0.04" color="#87CEEB" opacity="0.55"></a-box>
  <!-- Window cross bars -->
  <a-box position="-3 3.8 -6.83" width="2.1" height="0.05" depth="0.05" color="#c9a97a"></a-box>
  <a-box position="-3 3.8 -6.83" width="0.05" height="2.1" depth="0.05" color="#c9a97a"></a-box>
  <!-- Sunlight beam through window -->
  <a-box position="-2.2 1.8 -4" width="0.9" height="2.5" depth="5" color="#fff5c0" opacity="0.07" rotation="0 0 8"></a-box>

  <!-- ===================== CEILING LAMP ===================== -->
  <!-- Cord -->
  <a-cylinder position="0 5.8 0" height="1.6" radius="0.018" color="#4a3728"></a-cylinder>
  <!-- Lamp shade (cone) -->
  <a-cone position="0 4.6 0" radius-bottom="0.45" radius-top="0.08" height="0.35" color="#e8c97e" side="double"></a-cone>
  <!-- Bulb -->
  <a-sphere position="0 4.75 0" radius="0.09" color="#fff8c0" emissive="#ffe070" emissive-intensity="1"></a-sphere>

  <!-- ===================== WALL PAINTING (back wall) ===================== -->
  <!-- Frame -->
  <a-box position="2.5 4.2 -6.88" width="2.2" height="1.6" depth="0.08" color="#8B6914"></a-box>
  <!-- Canvas -->
  <a-box position="2.5 4.2 -6.84" width="1.95" height="1.35" depth="0.04" color="#d4e8c2"></a-box>
  <!-- Abstract art shapes -->
  <a-sphere position="2.1 4.4 -6.81" radius="0.28" color="#e07060"></a-sphere>
  <a-sphere position="2.9 4.0 -6.81" radius="0.22" color="#6090d0"></a-sphere>
  <a-cylinder position="2.5 4.1 -6.81" radius="0.12" height="0.6" color="#f0c040" rotation="0 0 30"></a-cylinder>

  <!-- ===================== BOOKSHELF (left wall) ===================== -->
  <!-- Shelf unit -->
  <a-box position="-6.6 2.0 2.5" width="0.3" height="4" depth="1.4" color="#a0712a"></a-box>
  <!-- Shelf boards -->
  <a-box position="-6.45 1.0 2.5" width="0.08" height="0.06" depth="1.35" color="#c9a97a"></a-box>
  <a-box position="-6.45 2.0 2.5" width="0.08" height="0.06" depth="1.35" color="#c9a97a"></a-box>
  <a-box position="-6.45 3.0 2.5" width="0.08" height="0.06" depth="1.35" color="#c9a97a"></a-box>
  <!-- Books on shelves -->
  <a-box position="-6.37 1.35 2.1" width="0.07" height="0.55" depth="0.18" color="#c0392b"></a-box>
  <a-box position="-6.37 1.35 2.3" width="0.07" height="0.48" depth="0.18" color="#27ae60"></a-box>
  <a-box position="-6.37 1.35 2.5" width="0.07" height="0.52" depth="0.18" color="#2980b9"></a-box>
  <a-box position="-6.37 1.35 2.7" width="0.07" height="0.44" depth="0.18" color="#8e44ad"></a-box>
  <a-box position="-6.37 2.35 2.1" width="0.07" height="0.5" depth="0.18" color="#e67e22"></a-box>
  <a-box position="-6.37 2.35 2.3" width="0.07" height="0.55" depth="0.18" color="#1abc9c"></a-box>
  <a-box position="-6.37 2.35 2.5" width="0.07" height="0.45" depth="0.18" color="#e74c3c"></a-box>
  <a-box position="-6.37 3.35 2.2" width="0.07" height="0.52" depth="0.18" color="#f39c12"></a-box>
  <a-box position="-6.37 3.35 2.5" width="0.07" height="0.48" depth="0.18" color="#2c3e50"></a-box>

  <!-- ===================== POTTED PLANT (corner) ===================== -->
  <!-- Pot -->
  <a-cylinder position="5.5 0.28 -5.5" radius-bottom="0.28" radius-top="0.22" height="0.55" color="#c0622f"></a-cylinder>
  <!-- Soil -->
  <a-cylinder position="5.5 0.56 -5.5" radius="0.21" height="0.06" color="#3d2b1f"></a-cylinder>
  <!-- Stem -->
  <a-cylinder position="5.5 1.05 -5.5" radius="0.035" height="0.95" color="#4a7c3f"></a-cylinder>
  <!-- Leaves -->
  <a-sphere position="5.5 1.6 -5.5" radius="0.42" color="#2d9e4e" scale="1 0.6 1"></a-sphere>
  <a-sphere position="5.2 1.4 -5.3" radius="0.25" color="#3ab55e" scale="1.2 0.5 1"></a-sphere>
  <a-sphere position="5.8 1.45 -5.7" radius="0.22" color="#27ae60" scale="1.1 0.5 1"></a-sphere>
  <!-- Second smaller plant -->
  <a-cylinder position="-5.5 0.22 -5.5" radius-bottom="0.20" radius-top="0.16" height="0.42" color="#b5541f"></a-cylinder>
  <a-cylinder position="-5.5 0.85 -5.5" radius="0.025" height="0.82" color="#4a7c3f"></a-cylinder>
  <a-sphere position="-5.5 1.3 -5.5" radius="0.32" color="#2d9e4e" scale="1 0.6 1"></a-sphere>

  <!-- ===================== RUG ===================== -->
  <a-plane rotation="-90 0 0" width="4.5" height="5" position="0 0.003 0.5" color="#c0392b"></a-plane>
  <!-- Rug border pattern -->
  <a-plane rotation="-90 0 0" width="4.1" height="4.6" position="0 0.004 0.5" color="#922b21"></a-plane>
  <a-plane rotation="-90 0 0" width="3.7" height="4.2" position="0 0.005 0.5" color="#e8d5b0"></a-plane>
  <a-plane rotation="-90 0 0" width="3.3" height="3.8" position="0 0.006 0.5" color="#c0392b"></a-plane>

  <!-- ===================== TABLE ===================== -->
  <!-- Tabletop -->
  <a-box position="0 0.85 0.5" width="2.2" height="0.08" depth="1.2" color="#6B3A2A"></a-box>
  <!-- Table legs -->
  <a-cylinder position="-0.95 0.42 1.0"  radius="0.055" height="0.84" color="#5a2e1a"></a-cylinder>
  <a-cylinder position=" 0.95 0.42 1.0"  radius="0.055" height="0.84" color="#5a2e1a"></a-cylinder>
  <a-cylinder position="-0.95 0.42 0.0"  radius="0.055" height="0.84" color="#5a2e1a"></a-cylinder>
  <a-cylinder position=" 0.95 0.42 0.0"  radius="0.055" height="0.84" color="#5a2e1a"></a-cylinder>
  <!-- Stretcher bars -->
  <a-cylinder position="0 0.28 1.0"  radius="0.025" height="1.9" rotation="0 0 90" color="#5a2e1a"></a-cylinder>
  <a-cylinder position="0 0.28 0.0"  radius="0.025" height="1.9" rotation="0 0 90" color="#5a2e1a"></a-cylinder>
  <a-cylinder position="-0.95 0.28 0.5" radius="0.025" height="1.0" rotation="90 0 0" color="#5a2e1a"></a-cylinder>
  <a-cylinder position=" 0.95 0.28 0.5" radius="0.025" height="1.0" rotation="90 0 0" color="#5a2e1a"></a-cylinder>

  <!-- ===================== CHAIR 1 (front of table) ===================== -->
  <!-- Seat -->
  <a-box position="0 0.52 2.0" width="0.6" height="0.06" depth="0.6" color="#8B5E3C"></a-box>
  <!-- Front legs -->
  <a-cylinder position="-0.26 0.26 1.74" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 0.26 1.74" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <!-- Back legs -->
  <a-cylinder position="-0.26 0.26 2.26" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 0.26 2.26" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <!-- Chair back posts (extended back legs) -->
  <a-cylinder position="-0.26 1.0 2.26" radius="0.04" height="1.02" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 1.0 2.26" radius="0.04" height="1.02" color="#6B3A2A"></a-cylinder>
  <!-- Back rails -->
  <a-box position="0 0.78 2.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 0.96 2.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 1.14 2.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 1.35 2.26" width="0.55" height="0.08" depth="0.06" color="#6B3A2A"></a-box>

  <!-- ===================== CHAIR 2 (back of table) ===================== -->
  <!-- Seat -->
  <a-box position="0 0.52 -1.0" width="0.6" height="0.06" depth="0.6" color="#8B5E3C"></a-box>
  <!-- Front legs -->
  <a-cylinder position="-0.26 0.26 -0.74" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 0.26 -0.74" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <!-- Back legs -->
  <a-cylinder position="-0.26 0.26 -1.26" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 0.26 -1.26" radius="0.04" height="0.52" color="#6B3A2A"></a-cylinder>
  <!-- Chair back posts -->
  <a-cylinder position="-0.26 1.0 -1.26" radius="0.04" height="1.02" color="#6B3A2A"></a-cylinder>
  <a-cylinder position=" 0.26 1.0 -1.26" radius="0.04" height="1.02" color="#6B3A2A"></a-cylinder>
  <!-- Back rails -->
  <a-box position="0 0.78 -1.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 0.96 -1.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 1.14 -1.26" width="0.55" height="0.06" depth="0.04" color="#8B5E3C"></a-box>
  <a-box position="0 1.35 -1.26" width="0.55" height="0.08" depth="0.06" color="#6B3A2A"></a-box>

  <!-- ===================== MILO TIN (on table) ===================== -->
  <!-- Main body -->
  <a-cylinder position="-0.55 1.09 0.35" radius="0.1" height="0.38" color="#1a5c1a"></a-cylinder>
  <!-- Label band -->
  <a-cylinder position="-0.55 1.09 0.35" radius="0.102" height="0.28" color="#2e8b2e"></a-cylinder>
  <!-- MILO text approximation - gold stripe -->
  <a-cylinder position="-0.55 1.09 0.35" radius="0.103" height="0.05" color="#d4a017"></a-cylinder>
  <!-- Lid -->
  <a-cylinder position="-0.55 1.30 0.35" radius="0.105" height="0.05" color="#a0522d"></a-cylinder>
  <!-- Bottom rim -->
  <a-cylinder position="-0.55 0.90 0.35" radius="0.105" height="0.03" color="#145214"></a-cylinder>

  <!-- ===================== MILK TIN (on table) ===================== -->
  <!-- Main body -->
  <a-cylinder position="0.55 1.06 0.35" radius="0.09" height="0.32" color="#e8e8e8"></a-cylinder>
  <!-- Label band (red for condensed milk style) -->
  <a-cylinder position="0.55 1.06 0.35" radius="0.092" height="0.22" color="#cc2200"></a-cylinder>
  <!-- White label center -->
  <a-cylinder position="0.55 1.06 0.35" radius="0.093" height="0.10" color="#f5f5f5"></a-cylinder>
  <!-- Lid -->
  <a-cylinder position="0.55 1.23 0.35" radius="0.094" height="0.04" color="#c0c0c0"></a-cylinder>
  <!-- Bottom rim -->
  <a-cylinder position="0.55 0.90 0.35" radius="0.094" height="0.03" color="#b0b0b0"></a-cylinder>

  <!-- ===================== CUP 1 (on table - left) ===================== -->
  <!-- Cup body (truncated cylinder) -->
  <a-cylinder position="-0.45 0.99 0.72" radius-bottom="0.075" radius-top="0.09" height="0.22" color="#f0f0f0"></a-cylinder>
  <!-- Cup inside (dark for tea/coffee illusion) -->
  <a-cylinder position="-0.45 1.10 0.72" radius="0.082" height="0.03" color="#3b1a08"></a-cylinder>
  <!-- Cup handle -->
  <a-torus position="-0.355 0.98 0.72" radius="0.04" radius-tubular="0.012" rotation="0 90 0" color="#d0d0d0"></a-torus>
  <!-- Saucer -->
  <a-cylinder position="-0.45 0.88 0.72" radius="0.13" height="0.025" color="#e8e8e8"></a-cylinder>

  <!-- ===================== CUP 2 (on table - right) ===================== -->
  <a-cylinder position="0.45 0.99 0.72" radius-bottom="0.075" radius-top="0.09" height="0.22" color="#f0e8d8"></a-cylinder>
  <a-cylinder position="0.45 1.10 0.72" radius="0.082" height="0.03" color="#3b1a08"></a-cylinder>
  <a-torus position="0.355 0.98 0.72" radius="0.04" radius-tubular="0.012" rotation="0 90 0" color="#c8b898"></a-torus>
  <a-cylinder position="0.45 0.88 0.72" radius="0.13" height="0.025" color="#e0d8c8"></a-cylinder>

  <!-- ===================== EXTRA TABLE ITEMS ===================== -->
  <!-- Small plate with biscuits -->
  <a-cylinder position="0 0.895 0.62" radius="0.15" height="0.02" color="#f5f0e0"></a-cylinder>
  <!-- Biscuit 1 -->
  <a-cylinder position="-0.06 0.91 0.58" radius="0.045" height="0.018" color="#d4a96a"></a-cylinder>
  <!-- Biscuit 2 -->
  <a-cylinder position="0.06 0.91 0.64" radius="0.045" height="0.018" color="#c8984f"></a-cylinder>
  <!-- Biscuit 3 -->
  <a-cylinder position="0 0.91 0.68" radius="0.045" height="0.018" color="#d4a96a"></a-cylinder>

  <!-- Sugar bowl -->
  <a-sphere position="0 1.0 0.22" radius="0.078" color="#f8f4ee" scale="1 0.75 1"></a-sphere>
  <a-cylinder position="0 0.94 0.22" radius="0.065" height="0.07" color="#f8f4ee"></a-cylinder>
  <!-- Lid knob -->
  <a-sphere position="0 1.06 0.22" radius="0.02" color="#d4a017"></a-sphere>

  <!-- Spoon on table -->
  <a-cylinder position="0.18 0.895 0.15" radius="0.01" height="0.28" color="#c0c0c0" rotation="0 30 0"></a-cylinder>
  <a-sphere position="0.22 0.895 0.04" radius="0.022" color="#c8c8c8" scale="1 0.4 1.6"></a-sphere>

  <!-- Tablecloth hint - small doily under tins -->
  <a-plane rotation="-90 0 0" width="1.5" height="0.7" position="0 0.895 0.35" color="#fffaf0" opacity="0.8"></a-plane>

  <!-- ===================== CAMERA ===================== -->
  <a-entity position="0 1.7 5.5">
    <a-camera look-controls wasd-controls>
      <a-cursor color="#ff4444" fuse="false"></a-cursor>
    </a-camera>
  </a-entity>

</a-scene>
</body>
</html>
