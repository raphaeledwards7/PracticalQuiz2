<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Garden Table Scene</title>
  <script src="aframe.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<a-scene shadow="type: pcfsoft; enabled: true">

  <!-- CAMERA -->
  <a-entity position="0 1.6 3.5">
    <a-camera look-controls wasd-controls>
      <a-cursor color="#ffffff" opacity="0.5"></a-cursor>
    </a-camera>
  </a-entity>

  <!-- SKY -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- LIGHTING -->
  <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
  <a-light type="directional" color="#fff8dc" intensity="1.0"
    position="4 6 3" cast-shadow="true"
    shadow-camera-left="-5" shadow-camera-right="5"
    shadow-camera-top="5" shadow-camera-bottom="-5">
  </a-light>

  <!-- GRASS GROUND -->
  <a-plane rotation="-90 0 0" width="30" height="30"
    material="color: #4CAF50; roughness: 1"
    shadow="receive: true">
  </a-plane>

  <!-- STONE PATIO -->
  <a-box position="0 0.015 -0.3" width="5" height="0.03" depth="5"
    material="color: #B0A090; roughness: 0.9"
    shadow="receive: true">
  </a-box>

  <!-- BACK WALL / HEDGE -->
  <a-box position="0 0.7 -4.5" width="10" height="1.4" depth="0.4"
    material="color: #2E7D32; roughness: 1">
  </a-box>

  <!-- TREES (left and right) -->
  <!-- Left tree trunk -->
  <a-cylinder position="-5 1.0 -3" height="2.0" radius="0.15"
    material="color: #5D4037; roughness: 0.9">
  </a-cylinder>
  <!-- Left tree foliage -->
  <a-sphere position="-5 2.5 -3" radius="1.2"
    material="color: #2E7D32; roughness: 0.8" shadow="cast: true">
  </a-sphere>

  <!-- Right tree trunk -->
  <a-cylinder position="5 1.0 -3" height="2.0" radius="0.15"
    material="color: #5D4037; roughness: 0.9">
  </a-cylinder>
  <!-- Right tree foliage -->
  <a-sphere position="5 2.5 -3" radius="1.2"
    material="color: #388E3C; roughness: 0.8" shadow="cast: true">
  </a-sphere>

  <!-- FLOWER POT LEFT -->
  <a-cylinder position="-2.5 0.2 -0.5" height="0.4" radius-bottom="0.18" radius-top="0.22"
    material="color: #BF360C; roughness: 0.8">
  </a-cylinder>
  <a-sphere position="-2.5 0.65 -0.5" radius="0.35"
    material="color: #1B5E20; roughness: 0.8">
  </a-sphere>

  <!-- FLOWER POT RIGHT -->
  <a-cylinder position="2.5 0.2 -0.5" height="0.4" radius-bottom="0.18" radius-top="0.22"
    material="color: #BF360C; roughness: 0.8">
  </a-cylinder>
  <a-sphere position="2.5 0.65 -0.5" radius="0.35"
    material="color: #388E3C; roughness: 0.8">
  </a-sphere>

  <!-- ===== TABLE ===== -->
  <!-- Tabletop -->
  <a-box position="0 0.78 -0.3" width="1.0" height="0.06" depth="2.0"
    material="color: #8B5E3C; roughness: 0.5"
    shadow="cast: true; receive: true">
  </a-box>
  <!-- Leg front-left -->
  <a-cylinder position="-0.42 0.38 0.6" height="0.78" radius="0.04"
    material="color: #6B3A18; roughness: 0.8" shadow="cast: true">
  </a-cylinder>
  <!-- Leg front-right -->
  <a-cylinder position="0.42 0.38 0.6" height="0.78" radius="0.04"
    material="color: #6B3A18; roughness: 0.8" shadow="cast: true">
  </a-cylinder>
  <!-- Leg back-left -->
  <a-cylinder position="-0.42 0.38 -1.2" height="0.78" radius="0.04"
    material="color: #6B3A18; roughness: 0.8" shadow="cast: true">
  </a-cylinder>
  <!-- Leg back-right -->
  <a-cylinder position="0.42 0.38 -1.2" height="0.78" radius="0.04"
    material="color: #6B3A18; roughness: 0.8" shadow="cast: true">
  </a-cylinder>

  <!-- ===== MILO TIN (left of centre) ===== -->
  <!-- Body -->
  <a-cylinder position="-0.2 0.93 -0.3" height="0.27" radius="0.07"
    material="color: #1B5E20; roughness: 0.3; metalness: 0.2"
    shadow="cast: true">
  </a-cylinder>
  <!-- Lid -->
  <a-cylinder position="-0.2 1.07 -0.3" height="0.02" radius="0.073"
    material="color: #2E7D32; roughness: 0.3; metalness: 0.4">
  </a-cylinder>
  <!-- Label band -->
  <a-cylinder position="-0.2 0.93 -0.3" height="0.2" radius="0.071"
    material="color: #43A047; roughness: 0.5; opacity: 0.85; transparent: true">
  </a-cylinder>
  <!-- Yellow stripe -->
  <a-box position="-0.129 0.93 -0.3" width="0.002" height="0.055" depth="0.1"
    material="color: #FFD600; shader: flat">
  </a-box>

  <!-- ===== MILK TIN (right of centre) ===== -->
  <!-- Body -->
  <a-cylinder position="0.2 0.92 -0.3" height="0.25" radius="0.065"
    material="color: #E0E0E0; roughness: 0.2; metalness: 0.6"
    shadow="cast: true">
  </a-cylinder>
  <!-- Lid -->
  <a-cylinder position="0.2 1.045 -0.3" height="0.02" radius="0.068"
    material="color: #BDBDBD; roughness: 0.2; metalness: 0.7">
  </a-cylinder>
  <!-- Red label -->
  <a-cylinder position="0.2 0.92 -0.3" height="0.17" radius="0.066"
    material="color: #D32F2F; roughness: 0.5; opacity: 0.9; transparent: true">
  </a-cylinder>
  <!-- White patch -->
  <a-box position="0.266 0.925 -0.3" width="0.002" height="0.05" depth="0.08"
    material="color: #FFFFFF; shader: flat">
  </a-box>

  <!-- ===== SQUARE CUP 1 (near / +Z end) ===== -->
  <!-- Saucer -->
  <a-box position="0 0.812 0.62" width="0.22" height="0.014" depth="0.22"
    material="color: #F5F0E8; roughness: 0.4" shadow="cast: true">
  </a-box>
  <!-- Cup body -->
  <a-box position="0 0.871 0.62" width="0.11" height="0.1" depth="0.11"
    material="color: #FFFFFF; roughness: 0.3" shadow="cast: true">
  </a-box>
  <!-- Coffee inside -->
  <a-box position="0 0.919 0.62" width="0.094" height="0.008" depth="0.094"
    material="color: #3E1C00; shader: flat">
  </a-box>
  <!-- Handle top -->
  <a-box position="0.079 0.895 0.62" width="0.02" height="0.01" depth="0.016"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>
  <!-- Handle bottom -->
  <a-box position="0.079 0.853 0.62" width="0.02" height="0.01" depth="0.016"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>
  <!-- Handle side -->
  <a-box position="0.089 0.874 0.62" width="0.006" height="0.052" depth="0.014"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>

  <!-- ===== SQUARE CUP 2 (far / -Z end) ===== -->
  <!-- Saucer -->
  <a-box position="0 0.812 -1.24" width="0.22" height="0.014" depth="0.22"
    material="color: #F5F0E8; roughness: 0.4" shadow="cast: true">
  </a-box>
  <!-- Cup body -->
  <a-box position="0 0.871 -1.24" width="0.11" height="0.1" depth="0.11"
    material="color: #FFFFFF; roughness: 0.3" shadow="cast: true">
  </a-box>
  <!-- Coffee inside -->
  <a-box position="0 0.919 -1.24" width="0.094" height="0.008" depth="0.094"
    material="color: #3E1C00; shader: flat">
  </a-box>
  <!-- Handle top -->
  <a-box position="0.079 0.895 -1.24" width="0.02" height="0.01" depth="0.016"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>
  <!-- Handle bottom -->
  <a-box position="0.079 0.853 -1.24" width="0.02" height="0.01" depth="0.016"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>
  <!-- Handle side -->
  <a-box position="0.089 0.874 -1.24" width="0.006" height="0.052" depth="0.014"
    material="color: #FFFFFF; roughness: 0.3">
  </a-box>

  <!-- ===== CHAIR 1 – near end, faces table (-Z) ===== -->
  <a-entity position="0 0 1.3" rotation="0 180 0">
    <!-- Seat -->
    <a-box position="0 0.48 0" width="0.55" height="0.05" depth="0.5"
      material="color: #8B5E3C; roughness: 0.7" shadow="cast: true; receive: true">
    </a-box>
    <!-- Cushion -->
    <a-box position="0 0.51 0" width="0.5" height="0.035" depth="0.46"
      material="color: #D4936A; roughness: 0.9">
    </a-box>
    <!-- Front legs -->
    <a-cylinder position="-0.22 0.24  0.2" height="0.48" radius="0.027" material="color: #6B3A18; roughness: 0.8"></a-cylinder>
    <a-cylinder position=" 0.22 0.24  0.2" height="0.48" radius="0.027" material="color: #6B3A18; roughness: 0.8"></a-cylinder>
    <!-- Back legs / backrest posts -->
    <a-cylinder position="-0.22 0.86 -0.2" height="1.72" radius="0.027" material="color: #6B3A18; roughness: 0.8" shadow="cast: true"></a-cylinder>
    <a-cylinder position=" 0.22 0.86 -0.2" height="1.72" radius="0.027" material="color: #6B3A18; roughness: 0.8" shadow="cast: true"></a-cylinder>
    <!-- Top rail -->
    <a-box position="0 1.18 -0.2" width="0.55" height="0.06" depth="0.04" material="color: #6B3A18; roughness: 0.6"></a-box>
    <!-- Mid rail -->
    <a-box position="0 0.88 -0.2" width="0.55" height="0.04" depth="0.03" material="color: #6B3A18; roughness: 0.6"></a-box>
    <!-- Back slat -->
    <a-box position="0 1.03 -0.2" width="0.38" height="0.12" depth="0.025" material="color: #A0622A; roughness: 0.65"></a-box>
  </a-entity>

  <!-- ===== CHAIR 2 – far end, faces table (+Z) ===== -->
  <a-entity position="0 0 -2.0" rotation="0 0 0">
    <!-- Seat -->
    <a-box position="0 0.48 0" width="0.55" height="0.05" depth="0.5"
      material="color: #8B5E3C; roughness: 0.7" shadow="cast: true; receive: true">
    </a-box>
    <!-- Cushion -->
    <a-box position="0 0.51 0" width="0.5" height="0.035" depth="0.46"
      material="color: #D4936A; roughness: 0.9">
    </a-box>
    <!-- Front legs -->
    <a-cylinder position="-0.22 0.24  0.2" height="0.48" radius="0.027" material="color: #6B3A18; roughness: 0.8"></a-cylinder>
    <a-cylinder position=" 0.22 0.24  0.2" height="0.48" radius="0.027" material="color: #6B3A18; roughness: 0.8"></a-cylinder>
    <!-- Back legs / backrest posts -->
    <a-cylinder position="-0.22 0.86 -0.2" height="1.72" radius="0.027" material="color: #6B3A18; roughness: 0.8" shadow="cast: true"></a-cylinder>
    <a-cylinder position=" 0.22 0.86 -0.2" height="1.72" radius="0.027" material="color: #6B3A18; roughness: 0.8" shadow="cast: true"></a-cylinder>
    <!-- Top rail -->
    <a-box position="0 1.18 -0.2" width="0.55" height="0.06" depth="0.04" material="color: #6B3A18; roughness: 0.6"></a-box>
    <!-- Mid rail -->
    <a-box position="0 0.88 -0.2" width="0.55" height="0.04" depth="0.03" material="color: #6B3A18; roughness: 0.6"></a-box>
    <!-- Back slat -->
    <a-box position="0 1.03 -0.2" width="0.38" height="0.12" depth="0.025" material="color: #A0622A; roughness: 0.65"></a-box>
  </a-entity>

</a-scene>
</body>
</html>
